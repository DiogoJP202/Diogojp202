<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="termGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="clip1"><rect x="30" y="46" width="0" height="20"><animate attributeName="width" values="0;0;100;100;0;0" keyTimes="0;0.001;0.05;0.80;0.88;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clip2"><rect x="30" y="72" width="0" height="20"><animate attributeName="width" values="0;0;240;240;0;0" keyTimes="0;0.07;0.13;0.80;0.88;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clip3"><rect x="30" y="98" width="0" height="20"><animate attributeName="width" values="0;0;170;170;0;0" keyTimes="0;0.16;0.22;0.80;0.88;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clip4"><rect x="30" y="124" width="0" height="20"><animate attributeName="width" values="0;0;370;370;0;0" keyTimes="0;0.25;0.37;0.80;0.88;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clip5"><rect x="30" y="150" width="0" height="20"><animate attributeName="width" values="0;0;220;220;0;0" keyTimes="0;0.39;0.47;0.80;0.88;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clip6"><rect x="30" y="176" width="0" height="20"><animate attributeName="width" values="0;0;100;100;0;0" keyTimes="0;0.50;0.55;0.80;0.88;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clip7"><rect x="30" y="202" width="0" height="20"><animate attributeName="width" values="0;0;290;290;0;0" keyTimes="0;0.58;0.68;0.80;0.88;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
  </defs>

  <rect x="2" y="2" width="696" height="256" rx="10" fill="#0a0a0a" stroke="#00ff66" stroke-width="2" filter="url(#termGlow)"/>

  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="38" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="56" cy="17" r="6" fill="#27c93f"/>
  <text x="75" y="21" font-family="monospace" font-size="12" fill="#00ff66" opacity="0.6">tonny@matrix: ~</text>
  <line x1="2" y1="32" x2="698" y2="32" stroke="#00ff66" stroke-width="1" opacity="0.35"/>

  <g clip-path="url(#clip1)"><text x="30" y="60" font-family="monospace" font-size="15" fill="#00ff66" opacity="0.85">$ whoami</text></g>
  <g clip-path="url(#clip2)"><text x="30" y="86" font-family="monospace" font-size="15" fill="#baffd9">&gt; Diogo Antonny (Tonny)</text></g>
  <g clip-path="url(#clip3)"><text x="30" y="112" font-family="monospace" font-size="15" fill="#00ff66" opacity="0.85">$ cat stack.txt</text></g>
  <g clip-path="url(#clip4)"><text x="30" y="138" font-family="monospace" font-size="15" fill="#baffd9">&gt; C# · .NET · ASP.NET · SQL Server</text></g>
  <g clip-path="url(#clip5)"><text x="30" y="164" font-family="monospace" font-size="15" fill="#baffd9">&gt; JavaScript · React</text></g>
  <g clip-path="url(#clip6)"><text x="30" y="190" font-family="monospace" font-size="15" fill="#00ff66" opacity="0.85">$ status</text></g>
  <g clip-path="url(#clip7)"><text x="30" y="216" font-family="monospace" font-size="15" fill="#baffd9">&gt; 修行中... compiling future</text></g>

  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.69;0.70;0.80;0.84;1" dur="14s" repeatCount="indefinite"/>
    <text x="30" y="242" font-family="monospace" font-size="15" fill="#00ff66" opacity="0.85">$</text>
    <rect x="46" y="230" width="9" height="16" fill="#00ff66">
      <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
